<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Historial de Pacientes — FisioSalud Milagros</title>
    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/admin.css">
    <style>
        /* ===== LAYOUT ===== */
        .admin-content { max-width: 900px; }

        /* ===== TABS ===== */
        .hist-tabs { display: flex; gap: 6px; margin-bottom: 1.4rem; }
        .hist-tab {
            flex: 1; padding: 10px; border-radius: var(--r-sm);
            border: 1px solid var(--border); background: transparent;
            color: var(--muted); font-family: 'DM Sans', sans-serif;
            font-size: .8rem; font-weight: 600; cursor: pointer;
            transition: all .2s; text-align: center;
        }
        .hist-tab.active {
            background: rgba(0,229,195,.1); border-color: rgba(0,229,195,.35);
            color: var(--accent);
        }

        /* ===== FORMULARIO ===== */
        .admin-form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .admin-form-group { margin-bottom: 10px; }
        .admin-form-group label {
            display: block; font-size: .72rem; color: var(--muted);
            font-weight: 600; text-transform: uppercase; letter-spacing: .05em;
            margin-bottom: 5px;
        }
        .admin-input {
            width: 100%; background: rgba(255,255,255,.04);
            border: 1px solid var(--border); border-radius: var(--r-sm);
            padding: 10px 12px; color: var(--text);
            font-family: 'DM Sans', sans-serif; font-size: .86rem; outline: none;
            transition: border-color .2s;
        }
        .admin-input:focus { border-color: rgba(0,229,195,.4); }
        .admin-select { appearance: none; cursor: pointer; }
        .admin-textarea { resize: vertical; min-height: 70px; }
        .admin-input[type="file"] { padding: 8px 12px; cursor: pointer; }

        /* ===== TABLA ===== */
        .hist-table-wrap { overflow-x: auto; }
        .hist-table {
            width: 100%; border-collapse: collapse; font-size: .78rem;
            min-width: 600px;
        }
        .hist-table th {
            padding: 9px 12px; text-align: left; font-size: .68rem;
            font-weight: 700; text-transform: uppercase; letter-spacing: .06em;
            color: var(--muted); border-bottom: 1px solid var(--border);
            white-space: nowrap;
        }
        .hist-table td {
            padding: 10px 12px; border-bottom: 1px solid rgba(255,255,255,.04);
            vertical-align: middle; color: var(--text);
        }
        .hist-table tr:hover td { background: rgba(255,255,255,.02); }

        /* badge estado */
        .badge {
            font-size: .62rem; font-weight: 700; padding: 3px 9px;
            border-radius: 100px; text-transform: uppercase; display: inline-block;
        }
        .badge-activo  { background: rgba(0,229,195,.1);  border: 1px solid rgba(0,229,195,.25);  color: var(--accent); }
        .badge-alta    { background: rgba(123,108,255,.1); border: 1px solid rgba(123,108,255,.25); color: var(--accent2); }

        /* botón alta */
        .btn-alta {
            font-size: .65rem; font-weight: 700; padding: 4px 10px;
            border-radius: 6px; border: 1px solid rgba(239,159,39,.3);
            background: rgba(239,159,39,.07); color: var(--gold); cursor: pointer;
            transition: all .2s;
        }
        .btn-alta:hover { background: rgba(239,159,39,.14); }
        .btn-cerrado { color: var(--subtle); font-size: .7rem; }

        /* foto miniatura */
        .mini-foto {
            width: 34px; height: 34px; border-radius: 50%; object-fit: cover;
            border: 1.5px solid var(--border); background: var(--bg4);
            display: flex; align-items: center; justify-content: center;
            font-size: .65rem; color: var(--muted); flex-shrink: 0;
            overflow: hidden;
        }
        .mini-foto img { width: 100%; height: 100%; object-fit: cover; }
        .fila-info { display: flex; align-items: center; gap: 8px; }

        /* buscador */
        .buscador-wrap { position: relative; margin-bottom: 1rem; }
        .buscador-wrap input { padding-left: 34px; }
        .buscador-icon {
            position: absolute; left: 11px; top: 50%; transform: translateY(-50%);
            color: var(--muted); font-size: .9rem; pointer-events: none;
        }

        /* contador */
        .cont-badge {
            background: rgba(0,229,195,.1); border: 1px solid rgba(0,229,195,.2);
            border-radius: 100px; padding: 2px 9px;
            font-size: .65rem; font-weight: 700; color: var(--accent);
        }

        /* btn registrar */
        .btn-add {
            background: var(--accent); color: #0a0a0f; border: none;
            padding: 11px 20px; border-radius: var(--r-sm); font-family: 'DM Sans',sans-serif;
            font-weight: 700; font-size: .86rem; cursor: pointer;
            display: inline-flex; align-items: center; gap: 7px; transition: all .2s;
        }
        .btn-add:hover { background: #00c9aa; transform: translateY(-1px); }

        /* estado vacío */
        .empty-state {
            text-align: center; padding: 2.5rem 1rem;
            color: var(--muted); font-size: .82rem;
        }
        .empty-state span { font-size: 2rem; display: block; margin-bottom: .5rem; }

        @media (max-width:520px) {
            .admin-form-row { grid-template-columns: 1fr; }
            .hist-tabs { flex-direction: column; }
        }
    </style>
</head>
<body>
<div class="admin-layout visible">

    <!-- HEADER -->
    <header class="admin-header">
        <div class="admin-header-left">
            <div style="position:relative;display:inline-block;padding-bottom:.55rem;padding-right:.35rem;">
                <span style="font-family:'Syne',sans-serif;font-weight:800;font-size:.95rem;color:#00e5c3;">Fisio</span>
                <span style="font-family:'Syne',sans-serif;font-weight:800;font-size:.95rem;color:#f0f0f5;">Salud</span>
                <span style="font-family:'Fraunces',serif;font-style:italic;font-size:.52rem;color:#f0f0f5;-webkit-text-stroke:.3px #7b6cff;position:absolute;bottom:0;right:-.08rem;transform:rotate(-9deg);transform-origin:left bottom;white-space:nowrap;">Milagros</span>
            </div>
            <span class="admin-badge">🗂️ Historial</span>
        </div>
        <button class="logout-btn" onclick="doLogout()">Cerrar sesión</button>
    </header>

    <div class="admin-content">

        <!-- TABS -->
        <div class="hist-tabs">
            <button class="hist-tab active" onclick="showTab('registrar',this)">➕ Registrar atención</button>
            <button class="hist-tab" onclick="showTab('tabla',this)">📋 Ver historial</button>
        </div>

        <!-- ========== PANEL: REGISTRAR ========== -->
        <div id="panelRegistrar">
            <div class="admin-card">
                <div class="admin-card-header">
                    <span class="admin-card-title">📝 Nueva atención</span>
                </div>

                <!-- Código automático -->
                <div class="admin-form-group">
                    <label>Código del paciente (generado automáticamente)</label>
                    <div style="display:flex;gap:8px;align-items:center;">
                        <input
                            class="admin-input"
                            id="f-codigo"
                            readonly
                            style="flex:1;background:rgba(0,229,195,.05);border-color:rgba(0,229,195,.3);
                                   font-family:monospace;font-size:.95rem;letter-spacing:.08em;color:var(--accent);"
                        >
                        <button
                            onclick="regenerarCodigoH()"
                            style="background:rgba(0,229,195,.1);border:1px solid rgba(0,229,195,.3);
                                   color:var(--accent);border-radius:var(--r-sm);padding:10px 13px;
                                   cursor:pointer;font-size:.8rem;white-space:nowrap;"
                        >🔄 Nuevo</button>
                        <button
                            onclick="copiarCodigoH()"
                            style="background:rgba(0,229,195,.1);border:1px solid rgba(0,229,195,.3);
                                   color:var(--accent);border-radius:var(--r-sm);padding:10px 13px;
                                   cursor:pointer;font-size:.8rem;white-space:nowrap;"
                        >📋 Copiar</button>
                    </div>
                    <p style="font-size:.7rem;color:var(--muted);margin-top:5px;line-height:1.5;">
                        ℹ️ Este código es único. Compártelo con el paciente para que consulte su historial.
                    </p>
                </div>

                <div class="admin-form-row">
                    <div class="admin-form-group">
                        <label>Fecha de atención *</label>
                        <input class="admin-input" id="f-fecha" type="date">
                    </div>
                    <div class="admin-form-group">
                        <label>Nombre completo *</label>
                        <input class="admin-input" id="f-nombre" placeholder="Ej: Juan Pérez">
                    </div>
                </div>

                <div class="admin-form-row">
                    <div class="admin-form-group">
                        <label>Edad</label>
                        <input class="admin-input" id="f-edad" type="number" placeholder="Ej: 35" min="0" max="120">
                    </div>
                    <div class="admin-form-group">
                        <label>Género</label>
                        <select class="admin-input admin-select" id="f-genero">
                            <option value="">— seleccionar —</option>
                            <option>Masculino</option>
                            <option>Femenino</option>
                            <option>Otro</option>
                        </select>
                    </div>
                </div>

                <div class="admin-form-row">
                    <div class="admin-form-group">
                        <label>Teléfono</label>
                        <input class="admin-input" id="f-telefono" type="tel" placeholder="Ej: 999 888 777">
                    </div>
                    <div class="admin-form-group">
                        <label>Estado</label>
                        <select class="admin-input admin-select" id="f-estado">
                            <option value="Activo">Activo</option>
                            <option value="Alta">Alta</option>
                        </select>
                    </div>
                </div>

                <div class="admin-form-group">
                    <label>Diagnóstico</label>
                    <textarea class="admin-input admin-textarea" id="f-diagnostico" placeholder="Describe el diagnóstico..."></textarea>
                </div>

                <div class="admin-form-group">
                    <label>Tratamiento</label>
                    <textarea class="admin-input admin-textarea" id="f-tratamiento" placeholder="Protocolo aplicado..."></textarea>
                </div>

                <div class="admin-form-group">
                    <label>Fotos del paciente (máx. 5 — controles, radiografías, recetas…)</label>
                    <input
                        class="admin-input"
                        id="f-fotos"
                        type="file"
                        accept="image/*"
                        multiple
                        onchange="previsualizarFotosH(this)"
                    >
                    <div id="f-fotos-preview" style="display:flex;flex-wrap:wrap;gap:7px;margin-top:8px;"></div>
                    <p style="font-size:.7rem;color:var(--muted);margin-top:4px;">
                        Selecciona hasta 5 imágenes a la vez.
                    </p>
                </div>

                <button class="btn-add" onclick="registrarAtencion()">
                    💾 Guardar atención
                </button>
            </div>
        </div>

        <!-- ========== PANEL: TABLA ========== -->
        <div id="panelTabla" style="display:none;">
            <div class="admin-card">
                <div class="admin-card-header">
                    <span class="admin-card-title">📋 Atenciones registradas</span>
                    <span class="cont-badge" id="contadorAtenciones">0 registros</span>
                </div>

                <div class="buscador-wrap">
                    <span class="buscador-icon">🔍</span>
                    <input class="admin-input" id="buscador" placeholder="Buscar por código, nombre o estado..." oninput="filtrarTabla()">
                </div>

                <div class="hist-table-wrap">
                    <table class="hist-table">
                        <thead>
                            <tr>
                                <th>Código</th>
                                <th>Paciente</th>
                                <th>Fecha</th>
                                <th>Teléfono</th>
                                <th>Estado</th>
                                <th>Acciones</th>
                            </tr>
                        </thead>
                        <tbody id="tablaBody">
                            <tr>
                                <td colspan="6">
                                    <div class="empty-state"><span>📭</span>Sin registros aún</div>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

    </div><!-- /admin-content -->
</div><!-- /admin-layout -->

<div class="admin-toast" id="adminToast"></div>

<!-- Scripts del proyecto -->
<script src="js/config.js"></script>
<script src="js/sheets.js"></script>

<script>
/* ============================================================
   historial.js — Lógica de la página de historial
   ============================================================ */

var SHEET_PACIENTES = 'Pacientes'; // Nombre de la hoja en Google Sheets
var todosLosRegistros = [];

/* ---- Verificar sesión (debe ser admin) ---- */
try {
    var rol = sessionStorage.getItem('fsm_rol');
    if (rol !== 'admin' && rol !== 'especialista') {
        window.location.href = 'acceso.html';
    }
} catch(e) { window.location.href = 'acceso.html'; }

/* ---- Fecha de hoy por defecto ---- */
window.addEventListener('load', function() {
    var hoy = new Date().toISOString().split('T')[0];
    document.getElementById('f-fecha').value = hoy;
    /* Código inicial provisional — se actualiza al cargar registros */
    document.getElementById('f-codigo').value = generarCodigoUnicoH();
    cargarTabla();
});

/* ---- Tabs ---- */
function showTab(tab, btn) {
    document.querySelectorAll('.hist-tab').forEach(function(t){ t.classList.remove('active'); });
    btn.classList.add('active');
    document.getElementById('panelRegistrar').style.display = tab === 'registrar' ? '' : 'none';
    document.getElementById('panelTabla').style.display     = tab === 'tabla'     ? '' : 'none';
    if (tab === 'tabla') cargarTabla();
}

/* ---- Generador de código único ---- */
function generarCodigoUnicoH() {
    var usados = {};
    todosLosRegistros.forEach(function(r) {
        usados[r.codigo || r.Codigo || ''] = true;
    });
    var intento;
    do {
        var longitud = 6 + Math.floor(Math.random() * 5); /* 6-10 dígitos */
        intento = '';
        for (var i = 0; i < longitud; i++) {
            intento += Math.floor(Math.random() * 10);
        }
    } while (usados[intento]);
    return intento;
}

function regenerarCodigoH() {
    document.getElementById('f-codigo').value = generarCodigoUnicoH();
}

function copiarCodigoH() {
    var val = document.getElementById('f-codigo').value;
    if (!val) return;
    navigator.clipboard ? navigator.clipboard.writeText(val).then(function() {
        showToast('📋 Código copiado: ' + val);
    }) : (function() {
        var t = document.createElement('textarea');
        t.value = val;
        document.body.appendChild(t);
        t.select();
        document.execCommand('copy');
        document.body.removeChild(t);
        showToast('📋 Código copiado: ' + val);
    })();
}

/* ---- Previsualizar fotos ---- */
function previsualizarFotosH(input) {
    var preview  = document.getElementById('f-fotos-preview');
    preview.innerHTML = '';
    var archivos = Array.from(input.files).slice(0, 5);
    archivos.forEach(function(file, i) {
        var reader = new FileReader();
        reader.onload = function(e) {
            var div = document.createElement('div');
            div.style.cssText = 'position:relative;width:60px;height:60px;border-radius:8px;overflow:hidden;' +
                                'border:1.5px solid var(--border);background:var(--bg4);';
            var img = document.createElement('img');
            img.src = e.target.result;
            img.style.cssText = 'width:100%;height:100%;object-fit:cover;';
            var num = document.createElement('span');
            num.textContent = i + 1;
            num.style.cssText = 'position:absolute;bottom:2px;right:4px;font-size:.6rem;font-weight:700;' +
                                'color:var(--accent);background:rgba(0,0,0,.6);border-radius:3px;padding:1px 3px;';
            div.appendChild(img);
            div.appendChild(num);
            preview.appendChild(div);
        };
        reader.readAsDataURL(file);
    });
}

/* ---- Registrar atención ---- */
function registrarAtencion() {
    var codigo    = document.getElementById('f-codigo').value.trim();
    var fecha     = document.getElementById('f-fecha').value;
    var nombre    = document.getElementById('f-nombre').value.trim();
    var edad      = document.getElementById('f-edad').value.trim();
    var genero    = document.getElementById('f-genero').value;
    var telefono  = document.getElementById('f-telefono').value.trim();
    var diag      = document.getElementById('f-diagnostico').value.trim();
    var trat      = document.getElementById('f-tratamiento').value.trim();
    var estado    = document.getElementById('f-estado').value;

    if (!codigo) { showToast('⚠️ Genera un código primero.'); return; }
    if (!fecha)  { showToast('⚠️ La fecha es obligatoria.'); return; }
    if (!nombre) { showToast('⚠️ El nombre es obligatorio.'); return; }

    var archivos = Array.from(document.getElementById('f-fotos').files).slice(0, 5);

    function guardarConFotos(fotosBase64) {
        var registro = {
            id:          Date.now(),
            codigo:      codigo,
            nombre:      nombre,
            edad:        edad,
            genero:      genero,
            telefono:    telefono,
            fecha:       formatearFecha(fecha),
            diagnostico: diag,
            tratamiento: trat,
            estado:      estado
        };

        fotosBase64.forEach(function(b64, i) {
            registro['foto' + (i + 1)] = b64;
        });

        showToast('💾 Guardando...');
        writeToSheet({ sheet: SHEET_PACIENTES, action: 'add', row: registro }, function() {
            showToast('✅ Atención registrada correctamente');
            limpiarFormulario();
            cargarTabla();
        });
    }

    if (archivos.length === 0) {
        guardarConFotos([]);
    } else {
        var resultados = [];
        var leidos     = 0;
        archivos.forEach(function(file, i) {
            var reader = new FileReader();
            reader.onload = function(e) {
                resultados[i] = e.target.result;
                leidos++;
                if (leidos === archivos.length) guardarConFotos(resultados);
            };
            reader.readAsDataURL(file);
        });
    }
}

/* ---- Cargar tabla desde Sheets / localStorage ---- */
function cargarTabla() {
    getData(SHEET_PACIENTES, function(data) {
        todosLosRegistros = data || [];
        renderTabla(todosLosRegistros);
        /* Regenerar código garantizando unicidad con los datos actuales */
        var campoCode = document.getElementById('f-codigo');
        if (campoCode) {
            campoCode.value = generarCodigoUnicoH();
        }
    });
}

/* ---- Renderizar tabla ---- */
function renderTabla(datos) {
    var tbody = document.getElementById('tablaBody');
    document.getElementById('contadorAtenciones').textContent = datos.length + ' registros';

    if (!datos.length) {
        tbody.innerHTML = '<tr><td colspan="7"><div class="empty-state"><span>📭</span>Sin registros aún</div></td></tr>';
        return;
    }

    tbody.innerHTML = datos.map(function(r) {
        var estado  = r.estado      || r.Estado      || 'Activo';
        var codigo  = r.codigo      || r.Codigo      || '';
        var nombre  = r.nombre      || r.Nombre      || '';
        var fecha   = r.fecha       || r.Fecha       || '';
        var tel     = r.telefono    || r.Telefono    || '—';
        var diag    = r.diagnostico || r.Diagnostico || '';
        var trat    = r.tratamiento || r.Tratamiento || '';
        var id      = r.id          || '';
        var esAlta  = estado === 'Alta';

        /* Primera foto disponible */
        var primeraFoto = '';
        for (var n = 1; n <= 5; n++) {
            var f = r['foto' + n] || r['Foto' + n] || '';
            if (f && f.startsWith('data:')) { primeraFoto = f; break; }
        }
        if (!primeraFoto) primeraFoto = r.foto || r.Foto || '';

        var avatarHTML = primeraFoto
            ? '<div class="mini-foto"><img src="' + primeraFoto + '" alt=""></div>'
            : '<div class="mini-foto">' + (nombre.charAt(0) || '?') + '</div>';

        /* Contar cuántas fotos tiene */
        var totalFotos = 0;
        for (var m = 1; m <= 5; m++) {
            var fm = r['foto' + m] || r['Foto' + m] || '';
            if (fm && fm.startsWith('data:')) totalFotos++;
        }
        if (!totalFotos && (r.foto || r.Foto)) totalFotos = 1;

        var fotoBadge = totalFotos > 0
            ? ' <span style="font-size:.6rem;background:rgba(0,229,195,.1);border:1px solid rgba(0,229,195,.2);' +
              'color:var(--accent);border-radius:100px;padding:1px 6px;">📷 ' + totalFotos + '</span>'
            : '';

        var diagCorto = diag.length > 50 ? diag.substring(0, 50) + '…' : diag;
        var tratCorto = trat.length > 50 ? trat.substring(0, 50) + '…' : trat;

        var accionHTML = esAlta
            ? '<span class="btn-cerrado">Alta ✓</span>'
            : '<button class="btn-alta" onclick="darAlta(\'' + id + '\')">Dar alta</button>';

        return '<tr>' +
            '<td><code style="color:var(--accent);font-size:.75rem;">' + codigo + '</code></td>' +
            '<td><div class="fila-info">' + avatarHTML +
                '<div><div>' + nombre + fotoBadge + '</div>' +
                (diagCorto ? '<div style="font-size:.68rem;color:var(--muted);margin-top:2px;" title="' + diag + '">' + diagCorto + '</div>' : '') +
                (tratCorto ? '<div style="font-size:.68rem;color:var(--subtle);margin-top:1px;" title="' + trat + '">' + tratCorto + '</div>' : '') +
                '</div></div></td>' +
            '<td>' + fecha + '</td>' +
            '<td>' + tel + '</td>' +
            '<td><span class="badge ' + (esAlta ? 'badge-alta' : 'badge-activo') + '">' + estado + '</span></td>' +
            '<td>' + accionHTML + '</td>' +
        '</tr>';
    }).join('');
}

/* ---- Dar de alta un paciente ---- */
function darAlta(id) {
    var registro = todosLosRegistros.find(function(r){ return String(r.id) === String(id); });
    if (!registro) return;
    var actualizado = Object.assign({}, registro, { estado: 'Alta' });

    writeToSheet({ sheet: SHEET_PACIENTES, action: 'update', id: id, row: actualizado }, function() {
        showToast('✅ Paciente dado de alta');
        cargarTabla();
    });
}

/* ---- Filtrar tabla ---- */
function filtrarTabla() {
    var q = document.getElementById('buscador').value.toLowerCase();
    var filtrados = todosLosRegistros.filter(function(r) {
        return (r.codigo    || '').toLowerCase().includes(q)
            || (r.nombre    || '').toLowerCase().includes(q)
            || (r.estado    || '').toLowerCase().includes(q)
            || (r.Codigo    || '').toLowerCase().includes(q)
            || (r.Nombre    || '').toLowerCase().includes(q)
            || (r.Estado    || '').toLowerCase().includes(q);
    });
    renderTabla(filtrados);
}

/* ---- Helpers ---- */
function formatearFecha(isoDate) {
    if (!isoDate) return '';
    var p = isoDate.split('-');
    return p[2] + '/' + p[1] + '/' + p[0];
}

function limpiarFormulario() {
    ['f-nombre', 'f-edad', 'f-telefono', 'f-diagnostico', 'f-tratamiento'].forEach(function(id) {
        document.getElementById(id).value = '';
    });
    document.getElementById('f-genero').value = '';
    document.getElementById('f-estado').value = 'Activo';
    document.getElementById('f-fotos').value  = '';
    document.getElementById('f-fotos-preview').innerHTML = '';
    var hoy = new Date().toISOString().split('T')[0];
    document.getElementById('f-fecha').value  = hoy;
    /* Generar nuevo código para la siguiente atención */
    document.getElementById('f-codigo').value = generarCodigoUnicoH();
}

function doLogout() { try { sessionStorage.clear(); } catch(e) {} window.location.href = 'acceso.html'; }

function showToast(msg) {
    var t = document.getElementById('adminToast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(function(){ t.classList.remove('show'); }, 3500);
}
</script>
